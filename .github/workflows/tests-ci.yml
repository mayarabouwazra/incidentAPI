name: .NET CI Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore (Get-ChildItem -Recurse -Filter "*.sln" | Select-Object -First 1).FullName
      shell: pwsh

    - name: Build project
      run: dotnet build (Get-ChildItem -Recurse -Filter "*.sln" | Select-Object -First 1).FullName --no-restore
      shell: pwsh

    - name: Run tests
      run: dotnet test (Get-ChildItem -Recurse -Filter "*.sln" | Select-Object -First 1).FullName --no-build --verbosity normal --logger "trx;LogFileName=TestResults.trx"
      shell: pwsh

    - name: Upload test report
      uses: actions/upload-artifact@v4
      with:
        name: test-report
        path: '**/TestResults.trx'